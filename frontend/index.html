<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBlitz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #0e0e0e;
  --paper:  #f5f0e8;
  --rule:   #d4c9b0;
  --accent: #c8391a;
  --muted:  #7a7060;
  --card:   #faf7f2;
  --mono:   'IBM Plex Mono', monospace;
  --serif:  'Source Serif 4', Georgia, serif;
  --display:'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { background: var(--paper); color: var(--ink); font-family: var(--serif); font-size: 17px; line-height: 1.65; }

body { min-height: 100vh; }

/* ── Masthead ── */
.masthead {
  border-bottom: 3px solid var(--ink);
  padding: 2rem 0 1.25rem;
  text-align: center;
  position: relative;
}
.masthead::before {
  content: '';
  display: block;
  border-top: 1px solid var(--rule);
  margin: 0 2rem 1rem;
}
.masthead-eyebrow {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}
.masthead-title {
  font-family: var(--display);
  font-size: clamp(3.5rem, 10vw, 7rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 0.9;
  margin-bottom: 0.5rem;
}
.masthead-title span { color: var(--accent); }
.masthead-tagline {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--muted);
  font-weight: 300;
}
.masthead-meta {
  margin-top: 1rem;
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  border-top: 1px solid var(--rule);
  padding-top: 0.75rem;
  display: flex;
  justify-content: center;
  gap: 2rem;
}
.masthead-meta span { display: flex; align-items: center; gap: 0.35rem; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
.dot.green { background: #2d7a3a; }
.dot.amber { background: #c87800; }

/* ── Layout ── */
.layout { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

/* ── Loading / Error ── */
.status-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 40vh; gap: 1rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--rule);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }

/* ── Headline strip ── */
.headline-strip {
  border-bottom: 1px solid var(--rule);
  padding: 2.5rem 0 2rem;
}
.headline-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.6rem;
}
.headline-text {
  font-family: var(--display);
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.01em;
  max-width: 820px;
}

/* ── Section headers ── */
.section-head {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin: 2.5rem 0 1.25rem;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 0.4rem;
}
.section-head h2 {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
}
.section-head .count {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--muted);
}

/* ── Story cards (Big Three) ── */
.story-grid { display: grid; gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 2rem; }
.story-card {
  background: var(--card);
  padding: 1.5rem 1.75rem;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.story-card:hover { background: #fff; }
.story-card.open { background: #fff; }
.story-num {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}
.story-title {
  font-family: var(--display);
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.4rem;
}
.story-preview {
  font-size: 0.88rem;
  color: var(--muted);
  font-style: italic;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.story-body {
  display: none;
  margin-top: 1.25rem;
  border-top: 1px solid var(--rule);
  padding-top: 1.25rem;
  font-size: 0.95rem;
  line-height: 1.75;
}
.story-card.open .story-body { display: block; }
.story-card.open .story-preview { display: none; }
.chevron {
  position: absolute; right: 1.5rem; top: 1.5rem;
  font-family: var(--mono); font-size: 0.7rem;
  color: var(--muted); transition: transform 0.2s;
}
.story-card.open .chevron { transform: rotate(90deg); }

/* ── Cross-country signal ── */
.signal-box {
  border-left: 3px solid var(--accent);
  padding: 1.25rem 1.5rem;
  background: var(--card);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  margin-bottom: 2rem;
  font-size: 0.95rem;
  line-height: 1.75;
}

/* ── Numbers of the week ── */
.numbers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 2rem; }
.number-card { background: var(--card); padding: 1.25rem 1.5rem; }
.number-val {
  font-family: var(--display);
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 0.5rem;
}
.number-desc { font-size: 0.82rem; line-height: 1.5; color: var(--muted); }

/* ── Data watch ── */
.watch-list { list-style: none; margin-bottom: 2rem; }
.watch-list li {
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--rule);
  font-size: 0.9rem;
  display: grid;
  grid-template-columns: 1.5rem 1fr;
  gap: 0.5rem;
  align-items: baseline;
}
.watch-list li::before {
  content: '—';
  font-family: var(--mono);
  color: var(--muted);
  font-size: 0.7rem;
}

/* ── Country briefs ── */
.briefs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 2rem; }
.brief-card { background: var(--card); padding: 1.25rem 1.5rem; cursor: pointer; transition: background 0.15s; }
.brief-card:hover { background: #fff; }
.brief-card.open { background: #fff; }
.brief-country {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.35rem;
}
.brief-snippet {
  font-size: 0.88rem;
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.brief-card.open .brief-snippet { -webkit-line-clamp: unset; overflow: visible; }

/* ── Method note ── */
.method-note {
  border-top: 1px solid var(--rule);
  padding: 1.5rem 0 3rem;
  font-size: 0.78rem;
  color: var(--muted);
  font-style: italic;
  line-height: 1.7;
}

/* ── Refresh button ── */
.refresh-btn {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.refresh-btn:hover { background: var(--ink); color: var(--paper); }

strong { font-weight: 600; }
em { font-style: italic; }
p + p { margin-top: 0.9rem; }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-eyebrow">Global Data Intelligence</div>
  <div class="masthead-title">Data<span>Blitz</span></div>
  <div class="masthead-tagline">AI-powered weekly deep dives into live government data worldwide</div>
  <div class="masthead-meta">
    <span id="run-date"><span class="dot amber"></span> Loading...</span>
    <span id="indicator-count"><span class="dot"></span> — indicators</span>
    <span id="countries-count"><span class="dot green"></span> 4 countries</span>
  </div>
</header>

<main class="layout" id="app">
  <div class="status-screen" id="loading">
    <div class="spinner"></div>
    <div class="status-text">Fetching latest digest...</div>
  </div>
</main>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// Point this at your Cloudflare Worker URL after deploying
// e.g. "https://datablitz-api.YOUR-SUBDOMAIN.workers.dev"
const API_BASE = window.DATABLITZ_API || 'https://datablitz-api.workers.dev';

// ── Helpers ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, cls, html='') => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
};

function parseMarkdownText(text) {
  // Bold, italic, inline conversion
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function parseSections(text) {
  const sections = {};
  let key = null, lines = [];
  for (const line of text.split('\n')) {
    const h = line.match(/^## (.+)$/);
    if (h) {
      if (key) sections[key] = lines.join('\n').trim();
      key = h[1].trim();
      lines = [];
    } else if (key) {
      lines.push(line);
    }
  }
  if (key) sections[key] = lines.join('\n').trim();
  return sections;
}

function textToHtml(text) {
  const lines = text.split('\n');
  let html = '', inList = false;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) {
      if (inList) { html += '</ul>'; inList = false; }
      continue;
    }
    if (line.startsWith('- ') || line.startsWith('• ')) {
      if (!inList) { html += '<ul class="watch-list">'; inList = true; }
      html += `<li>${parseMarkdownText(line.slice(2))}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      // H3
      if (line.startsWith('### ')) {
        html += `<h3 style="font-family:var(--display);font-size:1.05rem;margin:1.2rem 0 0.4rem">${line.slice(4)}</h3>`;
      } else {
        html += `<p>${parseMarkdownText(line)}</p>`;
      }
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function parseNumbers(text) {
  // "**VALUE** — description" pattern
  const results = [];
  for (const line of text.split('\n')) {
    const m = line.match(/\*\*(.+?)\*\*\s*[—–-]\s*(.+)/);
    if (m) results.push({ val: m[1], desc: m[2] });
  }
  return results;
}

function parseStories(text) {
  // Split by numbered bold headings: **1. Title** or **Title**
  const stories = [];
  const blocks = text.split(/\n\*\*\d+\.\s*/);
  for (const block of blocks.slice(1)) {
    const titleEnd = block.indexOf('**');
    if (titleEnd < 0) continue;
    const title = block.slice(0, titleEnd).trim();
    const body  = block.slice(titleEnd + 2).trim();
    stories.push({ title, body });
  }
  return stories;
}

// ── Toggle open/close ─────────────────────────────────────────────────────────
function toggleCard(card) {
  card.classList.toggle('open');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(narrative) {
  const app = $('app');
  app.innerHTML = '';

  const sections = parseSections(narrative.main_narrative);
  const meta     = narrative.meta || {};

  // Meta bar
  const runDate = new Date(narrative.generated_at);
  $('run-date').innerHTML = `<span class="dot amber"></span> ${runDate.toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}`;
  $('indicator-count').innerHTML = `<span class="dot"></span> ${meta.indicator_count ?? '—'} indicators`;

  // ── Headline ──────────────────────────────────────────────────────────────
  const headline = sections['HEADLINE'] || '';
  const hStrip = el('div', 'headline-strip');
  hStrip.innerHTML = `
    <div class="headline-label">This week's lead</div>
    <div class="headline-text">${parseMarkdownText(headline)}</div>
  `;
  app.appendChild(hStrip);

  // ── The Big Three ─────────────────────────────────────────────────────────
  const bigThreeText = sections['THE BIG THREE'] || '';
  const stories = parseStories(bigThreeText);

  if (stories.length) {
    const sh = el('div', 'section-head');
    sh.innerHTML = `<h2>The Big Three</h2><span class="count">${stories.length} stories — click to expand</span>`;
    app.appendChild(sh);

    const grid = el('div', 'story-grid');
    stories.forEach((s, i) => {
      const card = el('div', 'story-card');
      const preview = s.body.split('\n\n')[0] || '';
      card.innerHTML = `
        <div class="story-num">Story ${i + 1} of ${stories.length}</div>
        <div class="story-title">${parseMarkdownText(s.title)}</div>
        <div class="story-preview">${parseMarkdownText(preview)}</div>
        <div class="story-body">${textToHtml(s.body)}</div>
        <span class="chevron">▶</span>
      `;
      card.addEventListener('click', () => toggleCard(card));
      grid.appendChild(card);
    });
    app.appendChild(grid);
  }

  // ── Cross-Country Signal ──────────────────────────────────────────────────
  const signal = sections['CROSS-COUNTRY SIGNAL'] || '';
  if (signal) {
    const sh = el('div', 'section-head');
    sh.innerHTML = `<h2>Cross-Country Signal</h2>`;
    app.appendChild(sh);
    const box = el('div', 'signal-box');
    box.innerHTML = textToHtml(signal);
    app.appendChild(box);
  }

  // ── Numbers of the Week ───────────────────────────────────────────────────
  const numsText = sections['NUMBERS OF THE WEEK'] || '';
  const nums = parseNumbers(numsText);
  if (nums.length) {
    const sh = el('div', 'section-head');
    sh.innerHTML = `<h2>Numbers of the Week</h2><span class="count">${nums.length} stats</span>`;
    app.appendChild(sh);
    const grid = el('div', 'numbers-grid');
    nums.forEach(n => {
      const card = el('div', 'number-card');
      card.innerHTML = `<div class="number-val">${n.val}</div><div class="number-desc">${parseMarkdownText(n.desc)}</div>`;
      grid.appendChild(card);
    });
    app.appendChild(grid);
  }

  // ── Data Watch ────────────────────────────────────────────────────────────
  const watch = sections['DATA WATCH'] || '';
  if (watch) {
    const sh = el('div', 'section-head');
    sh.innerHTML = `<h2>Data Watch</h2>`;
    app.appendChild(sh);
    app.appendChild(el('div', null, textToHtml(watch)));
  }

  // ── Country Snapshots ─────────────────────────────────────────────────────
  const briefs = narrative.country_briefs || {};
  if (Object.keys(briefs).length) {
    const sh = el('div', 'section-head');
    sh.innerHTML = `<h2>Country Snapshots</h2><span class="count">click to read</span>`;
    app.appendChild(sh);

    const grid = el('div', 'briefs-grid');
    for (const [country, text] of Object.entries(briefs)) {
      const card = el('div', 'brief-card');
      card.innerHTML = `
        <div class="brief-country">${country.toUpperCase()}</div>
        <div class="brief-snippet">${parseMarkdownText(text)}</div>
      `;
      card.addEventListener('click', () => toggleCard(card));
      grid.appendChild(card);
    }
    app.appendChild(grid);
  }

  // ── Methodology Note ──────────────────────────────────────────────────────
  const method = sections['METHODOLOGY NOTE'] || '';
  if (method) {
    const note = el('div', 'method-note');
    note.innerHTML = `<strong>Methodology:</strong> ${parseMarkdownText(method)}`;
    app.appendChild(note);
  }
}

// ── Fetch + boot ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(`${API_BASE}/api/narrative`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch (err) {
    $('app').innerHTML = `
      <div class="status-screen">
        <div class="status-text">Failed to load: ${err.message}</div>
        <button class="refresh-btn" onclick="loadData()">Retry</button>
      </div>`;
  }
}

// Dev mode: load local narrative_latest.json if no worker is set
if (API_BASE.includes('workers.dev')) {
  // Try loading from local file in dev
  fetch('./data/narrative_latest.json')
    .then(r => r.ok ? r.json() : null)
    .then(d => d ? render(d) : loadData())
    .catch(() => loadData());
} else {
  loadData();
}
</script>

</body>
</html>
