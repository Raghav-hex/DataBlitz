name: DataBlitz Weekly Pipeline

on:
  schedule:
    - cron: "0 4 * * 0"   # Every Sunday 04:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI anytime

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          NOAA_CDO_TOKEN:     ${{ secrets.NOAA_CDO_TOKEN }}
          BLS_API_KEY:        ${{ secrets.BLS_API_KEY }}
          DATA_GOV_IN_KEY:    ${{ secrets.DATA_GOV_IN_KEY }}
          CACHE_DB_PATH:      ./data/cache/datablitz.sqlite
          CACHE_TTL_HOURS:    "48"
          HTTP_TIMEOUT_SECONDS: "30"
        run: python -m ingestion.pipeline --output ./data/digest_latest.json

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai_engine/package.json

      - name: Install Node deps
        run: cd ai_engine && npm install

      - name: Run AI narrative engine
        env:
          PUTER_AUTH_TOKEN: ${{ secrets.PUTER_AUTH_TOKEN }}
        run: node ai_engine/index.js --input ./data/digest_latest.json

      - name: Push digest to Cloudflare KV
        env:
          CF_ACCOUNT_ID:    ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE:  ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN:     ${{ secrets.CF_API_TOKEN }}
        run: python delivery/push_to_kv.py

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: data/
          retention-days: 7
